<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloxd.io Guide — Join the Waitlist</title>
  <meta name="description" content="The Bloxd.io AI guide is coming. Join the waitlist for exclusive early access." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #04060f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      top: -250px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 48px;
    }

    .logo-box {
      width: 32px; height: 32px;
      background: #2563eb;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .dot {
      width: 6px; height: 6px;
      background: #3b82f6;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(130deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: #64748b;
      font-size: 16px;
      line-height: 1.65;
      max-width: 380px;
      margin: 0 auto 36px;
    }

    /* Form */
    .form-wrap {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 28px 24px 22px;
      margin-bottom: 24px;
    }

    .field-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    @media (max-width: 480px) {
      .field-row { flex-direction: column; }
    }

    input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 13px 14px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #334155; }

    input:focus {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .btn {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 11px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      letter-spacing: -0.1px;
    }

    .btn:hover { background: #1d4ed8; box-shadow: 0 0 24px rgba(37,99,235,0.4); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .form-note {
      font-size: 12px;
      color: #1e293b;
      margin-top: 12px;
    }

    .form-error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.15);
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 13px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
      text-align: left;
    }

    /* Counter */
    .counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-size: 13px;
    }

    .avatars {
      display: flex;
    }

    .av {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid #04060f;
      font-size: 12px;
      display: grid;
      place-items: center;
      margin-left: -6px;
    }

    .av:first-child { margin-left: 0; background: linear-gradient(135deg,#3b82f6,#8b5cf6); }
    .av:nth-child(2) { background: linear-gradient(135deg,#22c55e,#3b82f6); }
    .av:nth-child(3) { background: linear-gradient(135deg,#f59e0b,#ef4444); }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 40px;
      color: #1e293b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="wrap">
    <div class="logo">
      <div class="logo-box">🎮</div>
      Bloxd.io Guide
    </div>

    <div class="badge">
      <div class="dot"></div>
      Waitlist now open
    </div>

    <h1>The Bloxd.io guide<br/>is <span>coming soon.</span></h1>

    <p class="sub">
      Be the first to know when we launch.<br/>
      Join the waitlist and get exclusive early access.
    </p>

    <div class="form-wrap">
      <div id="form-inner">
        <div class="field-row">
          <input type="text" id="name" placeholder="Your username" autocomplete="given-name" />
          <input type="email" id="email" placeholder="Email address" autocomplete="email" />
        </div>
        <div class="form-error" id="err"></div>
        <button class="btn" id="btn" onclick="submit()">Join the waitlist</button>
        <p class="form-note">No spam. Unsubscribe anytime.</p>
      </div>
    </div>

    <div class="counter">
      <div class="avatars">
        <div class="av">🎮</div>
        <div class="av">⚔️</div>
        <div class="av">🏆</div>
      </div>
      500+ players already waiting
    </div>
  </div>

  <footer>© 2026 Bloxd.io Guide</footer>

  <script>
    const URL = 'https://qsxmdlkqdonxttoqrrar.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzeG1kbGtxZG9ueHR0b3FycmFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjY1NjUsImV4cCI6MjA5MTUwMjU2NX0.WGqpDVuHlE0lIyPW8Zat4FKwpwKiArWnOIjTJdMYsf4';

    async function submit() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');

      err.style.display = 'none';
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Joining...';

      try {
        const res = await fetch(`${URL}/functions/v1/capture-lead`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': KEY, 'Authorization': `Bearer ${KEY}` },
          body: JSON.stringify({ name, email, source: 'waitlist' }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        window.location.href = '/thank-you';
      } catch (e) {
        err.textContent = e.message || 'Something went wrong. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Join the waitlist';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  </script>
</body>
</html>

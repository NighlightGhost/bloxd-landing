<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list! — Bloxd.io Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #04060f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0% { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: clamp(26px, 6vw, 36px);
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .sub {
      color: #64748b;
      font-size: 16px;
      line-height: 1.65;
      margin-bottom: 40px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 17px;
      padding: 16px 32px;
      border-radius: 14px;
      letter-spacing: -0.2px;
      transition: opacity 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 0 32px rgba(59,130,246,0.25);
    }

    .cta-btn:hover {
      opacity: 0.92;
      box-shadow: 0 0 48px rgba(59,130,246,0.4);
    }

    .cta-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <span class="emoji">🎉</span>
    <h1>Congratulations, you're on our exclusive access waitlist!</h1>
    <p class="sub">You'll get an email from us as soon as access is ready.</p>
    <a class="cta-btn" href="https://youtu.be/zHxK_1FT3CM?si=u7OBDm5Un5vdXegr" target="_blank" rel="noopener">
      ▶ Now watch the next step
    </a>
  </div>
</body>
</html>
